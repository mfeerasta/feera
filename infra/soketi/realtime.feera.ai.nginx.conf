# /etc/nginx/sites-available/realtime.feera.ai
# Reverse-proxy realtime.feera.ai -> Soketi on 127.0.0.1:6001 with WebSocket upgrade.
# Symlink into sites-enabled then `nginx -t && systemctl reload nginx`.
# TLS issued by certbot: `certbot --nginx -d realtime.feera.ai`.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name realtime.feera.ai;
    # certbot manages the http->https redirect after issuance.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name realtime.feera.ai;

    # certbot fills these in.
    ssl_certificate     /etc/letsencrypt/live/realtime.feera.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/realtime.feera.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # WebSocket + HTTP REST API both go through this single block.
    location / {
        proxy_pass http://127.0.0.1:6001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-lived websockets: bump timeouts to 1h.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # Block public access to the metrics port; bind on localhost via separate server if needed.
    location = /metrics {
        deny all;
        return 403;
    }
}
