# Soketi realtime (Pusher protocol) for Feera.
# ADR-0007.
#
# Deployed to /srv/soketi/docker-compose.yml on 46.225.157.75.
# Pair with /srv/soketi/.env (copy from .env.example, populate SOKETI_* secrets).
#
# Bring up:    cd /srv/soketi && docker compose up -d
# Logs:        docker compose logs -f soketi
# Restart:     docker compose restart soketi

services:
  soketi:
    image: quay.io/soketi/soketi:1.6-16-alpine
    container_name: feera-soketi
    restart: always
    ports:
      # Bind only to localhost; nginx reverse-proxies the public 443.
      - "127.0.0.1:6001:6001"
      - "127.0.0.1:9601:9601"
    environment:
      SOKETI_DEFAULT_APP_ID: ${SOKETI_APP_ID}
      SOKETI_DEFAULT_APP_KEY: ${SOKETI_KEY}
      SOKETI_DEFAULT_APP_SECRET: ${SOKETI_SECRET}
      SOKETI_DEFAULT_APP_ENABLE_CLIENT_MESSAGES: "false"
      SOKETI_DEFAULT_APP_MAX_CONNECTIONS: "2000"
      SOKETI_DEFAULT_APP_DEBUG: "0"
      SOKETI_METRICS_ENABLED: "1"
      SOKETI_METRICS_SERVER_PORT: "9601"
      SOKETI_DEBUG: "0"
      SOKETI_DB_REDIS_HOST: "127.0.0.1"
      SOKETI_DB_REDIS_PORT: "6379"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6001/usage"]
      interval: 30s
      timeout: 5s
      retries: 3
