name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build standalone bundle
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build apps/web
        env:
          AUTH_SECRET: build-time-placeholder-not-used-at-runtime
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: pnpm -C apps/web exec next build

      - name: Pack standalone
        env:
          SHA: ${{ github.sha }}
        run: |
          mkdir -p out
          tar -czf "out/feera-web-${SHA}.tar.gz" \
            -C apps/web/.next/standalone . \
            -C ../../../ apps/web/.next/static

      - uses: actions/upload-artifact@v4
        with:
          name: feera-web-${{ github.sha }}
          path: out/feera-web-${{ github.sha }}.tar.gz
          retention-days: 14
