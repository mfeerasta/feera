# Payment smoke tests (ADR-0003).
#
# Hits real provider sandboxes (Stripe test mode today; JazzCash + Easypaisa
# once SQ Enterprises walks us through merchant onboarding) with the smallest
# billable amount. Required to pass before any prod deploy that touched
# packages/payments.

name: payment-smoke

on:
  workflow_dispatch:
  schedule:
    # Weekly Monday 03:00 UTC.
    - cron: '0 3 * * 1'

jobs:
  stripe:
    runs-on: ubuntu-latest
    env:
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_TEST_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_TEST_WEBHOOK_SECRET }}
      RUN_INTEGRATION_PAYMENTS: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run Stripe adapter smoke
        run: pnpm -C packages/payments exec vitest run
