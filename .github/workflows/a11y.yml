name: A11y (axe-core)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  axe:
    name: axe-core scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      A11Y_TARGET_URL: ${{ secrets.A11Y_TARGET_URL || 'https://www.feera.ai' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @feera/web exec playwright install --with-deps chromium

      - name: Run axe-core a11y scan
        run: pnpm --filter @feera/web exec playwright test a11y

      - name: Upload axe report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: axe-results
          path: apps/web/test-results/
