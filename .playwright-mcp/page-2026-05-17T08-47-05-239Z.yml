          - paragraph [ref=e995]: Flexbase Technologies, Inc. (Flex) is a financial technology company and is not an FDIC-insured bank. Banking services provided by Thread Bank, Member FDIC. FDIC deposit insurance covers the failure of an insured bank. Certain conditions must be satisfied for pass-through deposit insurance coverage to apply. The Flex Visa debit card is issued by Thread Bank, Member FDIC, pursuant to a license from Visa U.S.A. Inc. and may be used anywhere Visa cards are accepted.
          - paragraph [ref=e996]: ‍
          - paragraph [ref=e997]: The Flex Business Credit Card is issued by Lead Bank, pursuant to a license from Visa U.S.A. Inc. and is only available to eligible commercial entities. Fees and terms and conditions apply. Applicants are subject to eligibility requirements.
          - paragraph [ref=e998]: "*Terms and conditions apply to the cash back rewards program. Cash back earned will be credited to your account the first day of each month. ATM transactions. the purchase of money orders or cash equivalents, and account funding made with your debit card are not eligible for cash back. Please refer to the Rewards Terms and Conditions for more details. No minimum balance requirement."
          - paragraph [ref=e999]: ‍
          - paragraph [ref=e1000]: "**Annual Percentage Yield (APY) of up to 2.47% for Tier 3 accounts and up to 1.37% APY for Tier 2 accounts is accurate as of 10/06/2025. These are variable rates based on the effective range of the Federal Funds Rate and may change after the account is opened. An average daily Account balance that is greater than $1,000,000 for at least thirty (30) days is required to be eligible to earn 2.47% APY and an average daily Account balance that is greater than $100,000 for at least thirty (30) days is required to be eligible to earn 1.37% APY."
          - paragraph [ref=e1001]: ‍
